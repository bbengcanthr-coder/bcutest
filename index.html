<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แบบทดสอบความรัก:คุณเป็นไทป์ไหน?</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #ffffff;
            --card-bg: #ffffff;
            --text-main: #4a4e69;
            --text-muted: #9a8c98;
            --primary-color: #ff758f;
            --primary-hover: #ff4d6d;
            --btn-bg: #ffe4e8;
            --btn-hover: #ffc2cc;
            --border-radius: 20px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Prompt', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 700px;
            border-radius: var(--border-radius);
            padding: 40px;
            box-shadow: 0 10px 30px rgba(255, 117, 143, 0.1);
            text-align: center;
            position: relative;
        }

        h1, h2 {
            font-weight: 600;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 15px;
            color: var(--primary-color);
        }

        p.subtitle {
            color: var(--text-muted);
            margin-bottom: 30px;
            font-size: 1rem;
            line-height: 1.5;
        }

        #quiz-section, #result-section {
            display: none;
        }

        .btn-main {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.1rem;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 117, 143, 0.4);
            font-weight: 500;
        }

        .btn-main:hover {
            background-color: var(--primary-hover);
            transform: translateY(-3px);
        }

        .progress-container {
            width: 100%;
            height: 12px;
            background-color: var(--btn-bg);
            border-radius: 10px;
            margin-bottom: 25px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background-color: var(--primary-color);
            width: 0%;
            transition: width 0.4s ease;
        }

        .question-text {
            font-size: 1.3rem;
            margin-bottom: 30px;
            line-height: 1.6;
            color: var(--text-main);
        }

        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-btn {
            background-color: var(--btn-bg);
            color: var(--text-main);
            border: 2px solid transparent;
            padding: 16px 20px;
            border-radius: 15px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: left;
            line-height: 1.5;
        }

        .option-btn:hover {
            background-color: var(--btn-hover);
            border-color: #ffb3c1;
            transform: translateY(-2px);
        }

        .result-emoji {
            font-size: 4.5rem;
            margin-bottom: 10px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-15px);}
            60% {transform: translateY(-7px);}
        }

        .result-title {
            font-size: 2rem;
            color: var(--primary-color);
            margin-bottom: 10px;
        }

        .result-desc {
            font-size: 1.05rem;
            color: var(--text-muted);
            margin-bottom: 25px;
            line-height: 1.6;
        }

        .analysis-box {
            background-color: #fffafb;
            border: 2px dashed #ffb3c1;
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 30px;
            text-align: left;
        }

        .analysis-box h3 {
            font-size: 1.1rem;
            margin-bottom: 8px;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .analysis-box p {
            font-size: 0.95rem;
            color: var(--text-main);
            margin-bottom: 20px;
            line-height: 1.6;
        }
        
        .analysis-box p:last-child {
            margin-bottom: 0;
        }

        footer {
            margin-top: 30px;
            font-size: 0.85rem;
            color: var(--text-muted);
            text-align: center;
        }

        @media (max-width: 600px) {
            .container {
                padding: 30px 20px;
            }
            .question-text {
                font-size: 1.15rem;
            }
            .option-btn {
                font-size: 0.95rem;
                padding: 14px 16px;
            }
            .result-title {
                font-size: 1.6rem;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="start-section">
            <h1>คุณเป็น"ไทป์" ไหน? </h1>
            <p class="subtitle">แบบทดสอบ25 ข้อ<br>เจาะลึกคาแรคเตอร์ สไตล์ และตัวตนของคุณ</p>
            <button class="btn-main" onclick="startQuiz()">เริ่มทำแบบทดสอบ</button>
        </div>

        <div id="quiz-section">
            <div class="progress-container">
                <div class="progress-bar" id="progress-bar"></div>
            </div>
            <p id="question-counter" class="subtitle" style="margin-bottom: 15px; font-weight: 500; color: var(--primary-color);">ข้อ 1 / 25</p>
            <h2 id="question-text" class="question-text"></h2>
            <div id="options-container" class="options-grid"></div>
        </div>

        <div id="result-section">
            <div id="result-emoji" class="result-emoji"></div>
            <h2 class="result-title" id="result-title"></h2>
            <p class="result-desc" id="result-desc"></p>
            
            <div class="analysis-box">
                <h3> ข้อดีเมื่อมีคุณเป็นแฟน</h3>
                <p id="result-strengths"></p>
                <h3> ข้อเสีย/สิ่งที่ต้องระวัง</h3>
                <p id="result-weaknesses"></p>
            </div>

            <button class="btn-main" onclick="location.reload()">ค้นหาหัวใจอีกครั้ง</button>
        </div>
    </div>

    <footer>
        &copy; 2026 Developed for มหาวิทยาลัยเบงจันทร์ (Bengchanh University)
    </footer>

        let currentQuestion = 0;
        let scores = { olddog: 0, youngcat: 0, puppy: 0, tsundere: 0, fox: 0, bear: 0, rabbit: 0, lion: 0, owl: 0, capybara: 0, wolf: 0, chick: 0, shark: 0, dolphin: 0, penguin: 0 };

        function startQuiz() {
            document.getElementById('start-section').style.display = 'none';
            document.getElementById('quiz-section').style.display = 'block';
            showQuestion();
        }

        function showQuestion() {
            const qData = questions[currentQuestion];
            document.getElementById('question-counter').innerText = `ข้อ ${currentQuestion + 1} / ${questions.length}`;
            document.getElementById('question-text').innerText = qData.q;
            
            const progress = ((currentQuestion) / questions.length) * 100;
            document.getElementById('progress-bar').style.width = `${progress}%`;

            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = ''; 

            const shuffledOptions = [...qData.options].sort(() => Math.random() - 0.5);

            shuffledOptions.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt.text;
                btn.onclick = () => selectOption(opt.type);
                optionsContainer.appendChild(btn);
            });
        }

        function selectOption(type) {
            scores[type]++;
            currentQuestion++;

            if (currentQuestion < questions.length) {
                showQuestion();
            } else {
                calculateResult();
            }
        }

        function calculateResult() {
            document.getElementById('progress-bar').style.width = `100%`;
            
            setTimeout(() => {
                document.getElementById('quiz-section').style.display = 'none';
                document.getElementById('result-section').style.display = 'block';

                let maxScore = -1;
                let finalType = '';

                for (const [type, score] of Object.entries(scores)) {
                    if (score > maxScore) {
                        maxScore = score;
                        finalType = type;
                    }
                }

                const result = typeData[finalType];
                document.getElementById('result-emoji').innerText = result.emoji;
                document.getElementById('result-title').innerText = result.title;
                document.getElementById('result-desc').innerText = result.desc;
                document.getElementById('result-strengths').innerText = result.strengths;
                document.getElementById('result-weaknesses').innerText = result.weaknesses;

            }, 400); 
        }
    </script>
